<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PerformTrack Manager Dashboard</title>
    
    <link rel="stylesheet" href="Login.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body onload="loadManagerCharts(); updateManagerTable();">

    <div class="dashboard-page">
        
        <header class="topbar">
          <div class="brand">
    <div class="brand">PerformTrack</div>
            <div class="topbar-right">
            <span class="dashboard-badge">Manager Dashboard</span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <main class="dashboard-main">

            <section class="table-card" style="margin-bottom: 25px;">
                <h3>Employee Performance Evaluation</h3>
                <div style="display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; align-items: center;">
                    
                    <input type="text" id="reviewEmpID" placeholder="Employee ID (e.g. EMP101)" 
                           style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    
                    <input type="number" id="reviewScore" placeholder="Score (0-100)" 
                           style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    
                    <input type="text" id="reviewFeedback" placeholder="Feedback/Comments" 
                           style="flex: 2; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                    
                    <button class="btn-action" onclick="submitReview()" style="height: 40px; margin: 0;">Submit Review</button>
                </div>
            </section>

            <section class="stats-grid">
                <div class="stat-card"><h3>Team Members</h3><p id="totalTeam">14</p></div>
                <div class="stat-card"><h3>Average Score</h3><p id="avgScore">82%</p></div>
                <div class="stat-card"><h3>Pending Reviews</h3><p>4</p></div>
                <div class="stat-card"><h3>Top Performer</h3><p>EMP204</p></div>
            </section>

            <section class="charts-grid">
                <div class="chart-card"><h3>Team Monthly Progress</h3><canvas id="teamProgressChart"></canvas></div>
                
                <div class="chart-card"><h3>Employee Score Comparison</h3><canvas id="teamCompareChart"></canvas></div>
            </section>

            <section class="bottom-grid">
                <div class="table-card">
                    <h3>Team Members Overview</h3>
                    <table id="managerTable">
                        <thead>
                            <tr><th>ID</th><th>Name</th><th>Score</th><th>Status</th></tr>
                        </thead>
                        <tbody id="managerTableBody">
                            </tbody>
                    </table>
                </div>

                <div class="alert-card">
                    <h3>Manager Actions</h3>
                    <ul id="managerAlerts">
                        <li>No new notifications</li>
                    </ul>
                </div>
            </section>

            <section class="table-card" style="margin-top: 25px;">
                <h3>Message Center</h3>
                <div id="messageInbox" class="messageInbox">
                    </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="msgRecipient" placeholder="To (e.g. HR or EMP101)" style="flex: 1;">
                    <input type="text" id="msgText" placeholder="Write a message..." style="flex: 2;">
                    <button class="btn-action" onclick="sendMessage()">Send</button>
                </div>
            </section>

            <div style="margin-top: 25px; display: flex; gap: 10px; justify-content: flex-end;">
                <button class="btn-action" onclick="generateSummary()">Generate Analytics</button>
                <button class="btn-action btn-secondary" onclick="window.print()">Export Report</button>
            </div>

        </main>
    </div>

    <script src="Login.js"></script>
</body>
</html>
